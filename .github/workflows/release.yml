name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          jq --arg v "$VERSION" '.version = $v' src-tauri/tauri.conf.json > tmp.json && mv tmp.json src-tauri/tauri.conf.json
          sed -i '' "s/^version = .*/version = \"$VERSION\"/" src-tauri/Cargo.toml

      - name: Install signing certificate
        if: ${{ secrets.CERTIFICATE_P12_BASE64 != '' }}
        env:
          CERTIFICATE_P12_BASE64: ${{ secrets.CERTIFICATE_P12_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PASSWORD="ci-build-$$"
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          echo "$CERTIFICATE_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/certificate.p12"
          security import "$RUNNER_TEMP/certificate.p12" -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"

      - uses: dtolnay/rust-toolchain@stable
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm tauri build
        env:
          APPLE_SIGNING_IDENTITY: "${{ secrets.CERTIFICATE_P12_BASE64 != '' && 'Developer ID Application' || '' }}"

      - name: Notarize app
        if: ${{ secrets.APPLE_ID != '' }}
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APP_SPECIFIC_PASSWORD: ${{ secrets.APP_SPECIFIC_PASSWORD }}
          TEAM_ID: ${{ secrets.TEAM_ID }}
        run: |
          DMG_PATH=$(find src-tauri/target/release/bundle -name "*.dmg" | head -1)
          xcrun notarytool submit "$DMG_PATH" \
            --apple-id "$APPLE_ID" \
            --password "$APP_SPECIFIC_PASSWORD" \
            --team-id "$TEAM_ID" \
            --wait
          xcrun stapler staple "$DMG_PATH"

      - name: Collect artifacts
        run: |
          mkdir -p build
          for f in src-tauri/target/release/bundle/dmg/*.dmg; do
            [ -f "$f" ] && cp "$f" "build/Clawless-${GITHUB_REF_NAME}-macos.dmg"
          done

      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: build/*.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set version from tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          jq --arg v "$VERSION" '.version = $v' src-tauri/tauri.conf.json > tmp.json && mv tmp.json src-tauri/tauri.conf.json
          sed -i "s/^version = .*/version = \"$VERSION\"/" src-tauri/Cargo.toml

      - uses: dtolnay/rust-toolchain@stable
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm tauri build

      - name: Collect artifacts
        shell: bash
        run: |
          mkdir -p build
          cp src-tauri/target/release/bundle/nsis/*.exe "build/Clawless-${GITHUB_REF_NAME}-windows.exe" 2>/dev/null || true
          cp src-tauri/target/release/bundle/msi/*.msi "build/Clawless-${GITHUB_REF_NAME}-windows.msi" 2>/dev/null || true

      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: |
            build/*.exe
            build/*.msi

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          jq --arg v "$VERSION" '.version = $v' src-tauri/tauri.conf.json > tmp.json && mv tmp.json src-tauri/tauri.conf.json
          sed -i "s/^version = .*/version = \"$VERSION\"/" src-tauri/Cargo.toml

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - uses: dtolnay/rust-toolchain@stable
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm tauri build

      - name: Collect artifacts
        run: |
          mkdir -p build
          cp src-tauri/target/release/bundle/deb/*.deb "build/Clawless-${GITHUB_REF_NAME}-linux.deb" 2>/dev/null || true
          cp src-tauri/target/release/bundle/appimage/*.AppImage "build/Clawless-${GITHUB_REF_NAME}-linux.AppImage" 2>/dev/null || true

      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: |
            build/*.deb
            build/*.AppImage

  release:
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "Clawless ${GITHUB_REF_NAME}" \
            --generate-notes \
            artifacts/*
