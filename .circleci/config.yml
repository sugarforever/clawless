version: 2.1

orbs:
  macos: circleci/macos@2
  windows: circleci/windows@5

jobs:
  build-macos:
    macos:
      xcode: "26.2.0"
    resource_class: m4pro.medium
    steps:
      - checkout

      # Install signing certificate
      - run:
          name: Install signing certificate
          command: |
            KEYCHAIN_PASSWORD="ci-build-$$"
            KEYCHAIN_PATH="$HOME/Library/Keychains/build.keychain-db"
            security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
            security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
            security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
            echo "$CERTIFICATE_P12_BASE64" | base64 --decode > /tmp/certificate.p12
            security import /tmp/certificate.p12 -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
            curl -sO https://www.apple.com/appleca/AppleIncRootCertificate.cer
            curl -sO https://www.apple.com/certificateauthority/AppleRootCA-G2.cer
            curl -sO https://www.apple.com/certificateauthority/DeveloperIDCA.cer
            curl -sO https://www.apple.com/certificateauthority/DeveloperIDG2CA.cer
            security import AppleIncRootCertificate.cer -k "$KEYCHAIN_PATH"
            security import AppleRootCA-G2.cer -k "$KEYCHAIN_PATH"
            security import DeveloperIDCA.cer -k "$KEYCHAIN_PATH"
            security import DeveloperIDG2CA.cer -k "$KEYCHAIN_PATH"
            rm -f AppleIncRootCertificate.cer AppleRootCA-G2.cer DeveloperIDCA.cer DeveloperIDG2CA.cer /tmp/certificate.p12
            security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
            security list-keychains -d user -s "$KEYCHAIN_PATH"
            security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      # Set version from git tag
      - run:
          name: Set version from tag
          command: |
            VERSION="${CIRCLE_TAG#v}"
            jq --arg v "$VERSION" '.version = $v' src-tauri/tauri.conf.json > tmp.json && mv tmp.json src-tauri/tauri.conf.json
            sed -i '' "s/^version = .*/version = \"$VERSION\"/" src-tauri/Cargo.toml

      # Install Rust
      - run:
          name: Install Rust
          command: |
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
            echo 'source "$HOME/.cargo/env"' >> "$BASH_ENV"

      # Install Node.js and pnpm
      - run:
          name: Install Node.js and pnpm
          command: |
            brew install node
            npm install -g pnpm

      # Install frontend dependencies
      - run:
          name: Install dependencies
          command: pnpm install --frozen-lockfile

      # Build Tauri app
      - run:
          name: Build Tauri app
          command: pnpm tauri build
          environment:
            APPLE_SIGNING_IDENTITY: "Developer ID Application"

      # Notarize
      - run:
          name: Notarize app
          command: |
            APP_PATH=$(find src-tauri/target/release/bundle/macos -name "*.app" -maxdepth 1 | head -1)
            ditto -c -k --keepParent "$APP_PATH" /tmp/Clawless.zip
            xcrun notarytool submit /tmp/Clawless.zip \
              --apple-id "$APPLE_ID" \
              --password "$APP_SPECIFIC_PASSWORD" \
              --team-id "$TEAM_ID" \
              --wait
            xcrun stapler staple "$APP_PATH"

      # Create DMG
      - run:
          name: Create DMG
          command: |
            APP_PATH=$(find src-tauri/target/release/bundle/macos -name "*.app" -maxdepth 1 | head -1)
            DMG_DIR="build/dmg-staging"
            mkdir -p "$DMG_DIR" build
            cp -R "$APP_PATH" "$DMG_DIR/"
            ln -s /Applications "$DMG_DIR/Applications"
            hdiutil create -volname "Clawless" \
              -srcfolder "$DMG_DIR" \
              -ov -format UDZO \
              "build/Clawless-${CIRCLE_TAG}-macos.dmg"
            rm -rf "$DMG_DIR"

      - persist_to_workspace:
          root: build
          paths:
            - "*.dmg"

      - store_artifacts:
          path: build

  build-windows:
    executor:
      name: windows/default
      size: medium
    steps:
      - checkout

      # Set version from git tag
      - run:
          name: Set version from tag
          shell: bash.exe
          command: |
            VERSION="${CIRCLE_TAG#v}"
            jq --arg v "$VERSION" '.version = $v' src-tauri/tauri.conf.json > tmp.json && mv tmp.json src-tauri/tauri.conf.json
            sed -i "s/^version = .*/version = \"$VERSION\"/" src-tauri/Cargo.toml

      # Install Rust
      - run:
          name: Install Rust
          shell: bash.exe
          command: |
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
            echo 'source "$HOME/.cargo/env"' >> "$BASH_ENV"

      # Install Node.js and pnpm
      - run:
          name: Install Node.js and pnpm
          shell: bash.exe
          command: |
            choco install nodejs -y
            npm install -g pnpm

      # Install frontend dependencies
      - run:
          name: Install dependencies
          shell: bash.exe
          command: pnpm install --frozen-lockfile

      # Build Tauri app
      - run:
          name: Build Tauri app
          shell: bash.exe
          command: pnpm tauri build

      # Collect artifacts
      - run:
          name: Collect artifacts
          shell: bash.exe
          command: |
            mkdir -p build
            cp src-tauri/target/release/bundle/nsis/*.exe "build/Clawless-${CIRCLE_TAG}-windows.exe" 2>/dev/null || true
            cp src-tauri/target/release/bundle/msi/*.msi "build/Clawless-${CIRCLE_TAG}-windows.msi" 2>/dev/null || true

      - persist_to_workspace:
          root: build
          paths:
            - "*.exe"
            - "*.msi"

      - store_artifacts:
          path: build

  build-linux:
    docker:
      - image: cimg/rust:1.82
    resource_class: medium
    steps:
      - checkout

      # Install system dependencies for Tauri
      - run:
          name: Install system dependencies
          command: |
            sudo apt-get update
            sudo apt-get install -y \
              libwebkit2gtk-4.1-dev \
              libappindicator3-dev \
              librsvg2-dev \
              patchelf \
              libssl-dev \
              libgtk-3-dev \
              libsoup-3.0-dev \
              libjavascriptcoregtk-4.1-dev

      # Set version from git tag
      - run:
          name: Set version from tag
          command: |
            VERSION="${CIRCLE_TAG#v}"
            jq --arg v "$VERSION" '.version = $v' src-tauri/tauri.conf.json > tmp.json && mv tmp.json src-tauri/tauri.conf.json
            sed -i "s/^version = .*/version = \"$VERSION\"/" src-tauri/Cargo.toml

      # Install Node.js and pnpm
      - run:
          name: Install Node.js and pnpm
          command: |
            curl -fsSL https://deb.nodesource.com/setup_22.x | sudo -E bash -
            sudo apt-get install -y nodejs
            sudo npm install -g pnpm

      # Install frontend dependencies
      - run:
          name: Install dependencies
          command: pnpm install --frozen-lockfile

      # Build Tauri app
      - run:
          name: Build Tauri app
          command: pnpm tauri build

      # Collect artifacts
      - run:
          name: Collect artifacts
          command: |
            mkdir -p build
            cp src-tauri/target/release/bundle/deb/*.deb "build/Clawless-${CIRCLE_TAG}-linux.deb" 2>/dev/null || true
            cp src-tauri/target/release/bundle/appimage/*.AppImage "build/Clawless-${CIRCLE_TAG}-linux.AppImage" 2>/dev/null || true

      - persist_to_workspace:
          root: build
          paths:
            - "*.deb"
            - "*.AppImage"

      - store_artifacts:
          path: build

  publish-release:
    docker:
      - image: cimg/base:current
    resource_class: small
    steps:
      - checkout
      - attach_workspace:
          at: build

      - run:
          name: Install GitHub CLI
          command: |
            curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
            echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null
            sudo apt-get update && sudo apt-get install -y gh

      - run:
          name: Create GitHub Release
          command: |
            # Extract release notes from CHANGELOG.md
            RELEASE_NOTES=$(sed -n "/^## \[${CIRCLE_TAG}\]/,/^## \[/{/^## \[${CIRCLE_TAG}\]/d;/^## \[/d;p;}" CHANGELOG.md | sed '/./,$!d' | sed -e :a -e '/^[[:space:]]*$/d;N;ba')
            if [ -z "$RELEASE_NOTES" ]; then
              RELEASE_NOTES="Release ${CIRCLE_TAG}"
            fi
            # Create release and upload all artifacts
            gh release create "$CIRCLE_TAG" \
              --title "Clawless ${CIRCLE_TAG}" \
              --notes "$RELEASE_NOTES" \
              build/*

workflows:
  build:
    jobs:
      - build-macos:
          filters:
            tags:
              only: /^v.*/
            branches:
              ignore: /.*/
      - build-windows:
          filters:
            tags:
              only: /^v.*/
            branches:
              ignore: /.*/
      - build-linux:
          filters:
            tags:
              only: /^v.*/
            branches:
              ignore: /.*/
      - publish-release:
          requires:
            - build-macos
            - build-windows
            - build-linux
          filters:
            tags:
              only: /^v.*/
            branches:
              ignore: /.*/
